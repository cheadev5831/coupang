name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyC-NE-aQZg3r21ZRtWSUAaBs5xIVHgipfs
          VITE_FIREBASE_AUTH_DOMAIN: coupang-9f1d0.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: coupang-9f1d0
          VITE_FIREBASE_STORAGE_BUCKET: coupang-9f1d0.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "54636612524"
          VITE_FIREBASE_APP_ID: 1:54636612524:web:255b12994466c597274809

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/spa

      - id: deployment
        uses: actions/deploy-pages@v4
